<script type="module">
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { auth } from "./firebase-client.js";

  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.href = "login.html"; // Redirect if not logged in
    }
  });
</script>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Inventory | IT Asset Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body class="bg-body flex h-screen">

  <!-- Global loader overlay -->
<div id="loaderOverlay"
     style="position:fixed; inset:0; background:rgba(255,255,255,0.6); display:flex; align-items:center; justify-content:center; z-index:9999; visibility:hidden;">
  <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-[#0F766E] border-solid"></div>
</div>

  <!-- Sidebar -->
  <aside class="sidebar w-36 shadow-md px-4 py-4">
    <h2 class="sidebar-title">FF Inventory</h2>
    <nav class="sidebar-nav">
      <a href="add-asset.html"><i class="bi bi-plus-circle"></i> Add Asset</a>
      <a href="allocate-asset.html"><i class="bi bi-arrow-left-right"></i> Allocate Asset</a>
      <a href="asset-inventory.html" class="active"><i class="bi bi-layers"></i> Asset Inventory</a>
      <a href="user-asset-overview.html"><i class="bi bi-people-fill"></i> User Asset Overview</a>
      <a href="asset-summary.html"><i class="bi bi-bar-chart-line-fill"></i> Asset Summary</a>
    </nav>
    <button class="btn-logout mt-6 w-full" onclick="logout()">Logout</button>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-6 overflow-y-auto w-full">
    <header class="mb-6">
      <h1 class="page-title">Asset Inventory</h1>
    </header>

    <!-- Filters -->
    <div class="flex flex-wrap gap-4 mb-4">
      <input type="text" id="searchInput" placeholder="Search by Asset ID or Model" class="form-input w-64">
      <select id="statusFilter" class="border px-3 py-2 rounded w-48">
        <option value="">All Statuses</option>
        <option value="Available">Available</option>
        <option value="Allocated">Allocated</option>
      </select>
      <button id="resetFilters" class="btn-secondary">Reset</button>
    </div>

    <!-- Filter by Type -->
    <select id="typeFilter" class="form-input w-48">
      <option value="">All Types</option>
      <option value="Laptop">Laptop</option>
      <option value="Monitor">Monitor</option>
      <option value="Keyboard">Keyboard</option>
      <option value="Mouse">Mouse</option>
      <option value="Headset">Headset</option>
      <option value="Desktop">Desktop</option>
    </select>

    <!-- ✅ Outer wrapper for scaling -->
    <div style="transform: scale(0.9); transform-origin: top left; width: 111%; overflow-x: auto;">

      <!-- Inventory Table -->
      <div class="bg-white rounded-lg shadow-md overflow-auto max-h-[85vh]">
      <table class="min-w-full table-auto text-sm">
      <thead class="bg-gray-200 text-gray-700 font-semibold sticky top-0 z-20">
             <tr>
              <th class="w-10 px-2 py-1 border">#</th>
              <th class="w-22 px-2 py-1 border">Asset ID</th>
              <th class="w-24 px-2 py-1 border">Type</th>
              <th class="w-40 px-2 py-1 border">Model</th>
              <th class="w-40 px-2 py-1 border">Serial Number</th>
              <th class="w-35 px-2 py-1 border">Allocated To</th>
              <th class="w-30 px-2 py-1 border">Allocation Date</th>
              <th class="w-30 px-2 py-1 border">Purchase Date</th>
              <th class="w-22 px-2 py-1 border">Status</th>
              <th class="w-25 px-2 py-1 border">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-sm"></tbody>
        </table>

        <!-- ✅ Pagination Controls -->
        <div id="pagination" class="mt-4 flex justify-between items-center text-sm"></div>
      </div>
    </div>

    <!-- ✅ JS -->
    <script type="module" src="js/asset-inventory.js"></script>

    <!-- ✏️ Edit Asset Modal -->
    <div id="editAssetModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded w-[92%] max-w-2xl max-h-[90vh] overflow-y-auto">
        <h3 class="text-lg font-bold mb-4">Edit Asset</h3>

        <form id="editAssetForm" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="editAssetId" class="form-label">Asset ID</label>
              <input id="editAssetId" type="text" class="form-input" readonly />
            </div>

            <div>
              <label for="editType" class="form-label">Type *</label>
              <input id="editType" type="text" class="form-input" required />
            </div>

            <div>
              <label for="editModel" class="form-label">Model *</label>
              <input id="editModel" type="text" class="form-input" required />
            </div>

            <div>
              <label for="editSerialNumber" class="form-label">Serial Number *</label>
              <input id="editSerialNumber" type="text" class="form-input" required />
            </div>

            <div>
              <label for="editAllocatedTo" class="form-label">Allocated To</label>
              <input id="editAllocatedTo" type="text" class="form-input" />
            </div>

            <div>
              <label for="editPurchaseDate" class="form-label">Purchase Date *</label>
              <input id="editPurchaseDate" type="date" class="form-input" required />
            </div>
          </div>

          <div class="flex justify-end gap-2 mt-4">
            <button type="button" id="cancelEditModal" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </form>

        <div class="text-right mt-3">
          <button id="closeEditModal" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>

    <!-- 🔍 History Modal -->
    <div id="historyModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
      <div class="bg-white p-6 rounded w-[90%] max-w-md max-h-[80vh] overflow-y-auto">
        <h3 class="text-lg font-bold mb-4">Asset History</h3>
        <ul id="historyList" class="space-y-2 text-sm"></ul>
        <div class="text-right mt-4">
          <button onclick="document.getElementById('historyModal').classList.add('hidden')" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>
  </main>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="js/ui-toast.js"></script>
    <!--Logout Fun-->
  <script type="module" src="auth.js"></script>

  <!-- Reusable confirmation modal -->
<div id="confirmModal" class="confirm-modal hidden" aria-hidden="true">
  <div class="confirm-modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
    <div class="confirm-modal-icon" data-confirm-icon data-type="warning">
      <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <h3 id="confirmModalTitle" class="confirm-modal-title" data-confirm-title>Confirm Action</h3>
    <p class="confirm-modal-message" data-confirm-message>Are you sure you want to continue?</p>
    <div class="confirm-modal-actions">
      <button type="button" class="btn-secondary" data-confirm-cancel>Cancel</button>
      <button type="button" class="btn-primary" data-confirm-ok>Confirm</button>
    </div>
  </div>
</div>
  
</body>
</html>
